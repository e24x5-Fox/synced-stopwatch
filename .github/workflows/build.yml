name: Build APK and EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies for Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk build-essential \
            autoconf libtool pkg-config cmake \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            libffi-dev libssl-dev libsqlite3-dev \
            automake ccache

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 virtualenv

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: synced-stopwatch-apk
          path: bin/*.apk

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      # GitHub's windows-latest runners have no real GPU - only the software
      # "GDI Generic" renderer, which is stuck at OpenGL 1.1. Kivy requires
      # OpenGL 2.0+, so without this it fails (and can hang) at build time
      # when PyInstaller's Kivy hook tries to initialize a window.
      # ANGLE translates Kivy's GL calls to DirectX instead, which works fine
      # on these runners.
      KIVY_GL_BACKEND: angle_sdl2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kivy and PyInstaller
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install docutils pygments pypiwin32 kivy_deps.sdl2 kivy_deps.glew kivy_deps.angle
          python -m pip install kivy
          python -m pip install pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name SyncedStopwatch main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: synced-stopwatch-exe
          path: dist/SyncedStopwatch.exe

  publish-release:
    needs: [build-android, build-windows]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: synced-stopwatch-apk
          path: apk

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: synced-stopwatch-exe
          path: exe

      - name: Attach files to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apk/*.apk
            exe/*.exe
